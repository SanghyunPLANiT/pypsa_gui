<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyPSA GUI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .app {
            display: flex;
            height: 100vh;
        }
        .left-panel {
            width: 300px;
            background-color: #f8f9fa;
            border-right: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
        }
        .map-container {
            flex: 1;
            height: 100vh;
        }
        .right-panel {
            width: 350px;
            background-color: #f5f5f5;
            border-left: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
        }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn:hover { opacity: 0.8; }
        .context-menu {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            min-width: 150px;
        }
        .context-menu-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .context-menu-item:hover {
            background-color: #f0f0f0;
        }

        .component-section {
            margin-bottom: 15px;
        }

        .component-section h4 {
            margin: 0 0 8px 0;
            padding: 8px;
            background-color: #e9ecef;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .component-section h4:hover {
            background-color: #dee2e6;
        }

        .expand-icon {
            font-size: 12px;
            transition: transform 0.2s;
        }

        .expand-icon.collapsed {
            transform: rotate(-90deg);
        }

        .component-list-items.collapsed {
            display: none;
        }

        .component-list-items {
            padding-left: 10px;
        }

        .component-list-item {
            padding: 6px 8px;
            margin-bottom: 3px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .component-list-item:hover {
            background-color: #e3f2fd;
        }

        .component-list-item.selected {
            background-color: #2196f3;
            color: white;
        }

        .component-count {
            background-color: #6c757d;
            color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .component-type-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="left-panel">
            <h3 style="margin-top: 0;">Components</h3>
            <div id="component-list">
                <p style="color: #666; font-size: 12px;">Components will appear here as you add them.</p>
            </div>
        </div>
        <div class="map-container">
            <div id="map" style="height: 100%; width: 100%;"></div>
        </div>
        <div class="right-panel">
            <h3>PyPSA GUI</h3>
            <button class="btn btn-success" onclick="exportToExcel()" style="width: 100%; margin-top: 10px;">
                Export to Excel
            </button>
            <div id="component-form">
                <p>Right-click on the map to add components or select an existing component to edit.</p>
            </div>
        </div>
    </div>

    <div id="context-menu" class="context-menu" style="display: none;">
        <div class="context-menu-item" onclick="addComponent('Bus')">Add Bus</div>
        <div class="context-menu-item" onclick="addComponent('Generator')">Add Generator</div>
        <div class="context-menu-item" onclick="addComponent('Load')">Add Load</div>
        <div class="context-menu-item" onclick="addComponent('Line')">Add Line</div>
        <div class="context-menu-item" onclick="addComponent('Link')">Add Link</div>
        <div class="context-menu-item" onclick="addComponent('Transformer')">Add Transformer</div>
        <div class="context-menu-item" onclick="addComponent('StorageUnit')">Add Storage Unit</div>
        <div class="context-menu-item" onclick="addComponent('Store')">Add Store</div>
        <div class="context-menu-item" onclick="addComponent('ShuntImpedance')">Add Shunt Impedance</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([40.7128, -74.0060], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Data storage
        const network = {
            buses: [],
            generators: [],
            loads: [],
            lines: [],
            links: [],
            transformers: [],
            storage_units: [],
            stores: [],
            shunt_impedances: []
        };

        let selectedComponent = null;
        let connectionMode = null;
        let firstSelectedBus = null;
        let contextMenuPos = null;
        
        // Track expanded/collapsed state of component groups
        const expandedGroups = {
            buses: true,
            generators: true,
            loads: true,
            lines: true,
            links: true,
            transformers: true,
            storage_units: true,
            stores: true,
            shunt_impedances: true
        };

        // Component markers and lines
        const markers = {};
        const connections = [];
        const virtualConnections = {};

        // Context menu handling
        map.on('contextmenu', function(e) {
            e.originalEvent.preventDefault();
            contextMenuPos = e.latlng;
            const contextMenu = document.getElementById('context-menu');
            contextMenu.style.display = 'block';
            contextMenu.style.left = e.originalEvent.clientX + 'px';
            contextMenu.style.top = e.originalEvent.clientY + 'px';
        });

        map.on('click', function(e) {
            document.getElementById('context-menu').style.display = 'none';
        });

        // Generate unique ID
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // Add component
        function addComponent(type) {
            if (!contextMenuPos) return;
            
            const id = generateId();
            const component = {
                id: id,
                name: `${type}_${id}`,
            };

            // Set default values based on type
            if (type === 'Bus') {
                // PyPSA Required: name (auto-generated)
                // PyPSA Optional: all others have defaults
                component.x = contextMenuPos.lng;
                component.y = contextMenuPos.lat;
                component.v_nom = '';
                component.carrier = '';
                component.v_mag_pu_set = '';
                component.v_mag_pu_min = '';
                component.v_mag_pu_max = '';
                component.control = '';
                component.sub_network = '';
                component.country = '';
                component.area = '';
                component.zone = '';
                network.buses.push(component);
                addBusMarker(component);
            } else if (type === 'Generator') {
                component.bus = '';
                component.control = 'PQ';
                component.type = '';
                component.p_nom = 100;
                component.p_nom_extendable = false;
                component.p_nom_min = 0;
                component.p_nom_max = '';
                component.p_min_pu = 0;
                component.p_max_pu = 1;
                component.p_set = 0;
                component.q_set = 0;
                component.sign = 1;
                component.carrier = 'gas';
                component.marginal_cost = 50;
                component.capital_cost = 0;
                component.efficiency = 0.4;
                component.committable = false;
                component.start_up_cost = 0;
                component.shut_down_cost = 0;
                component.min_up_time = 0;
                component.min_down_time = 0;
                component.up_time_before = 1;
                component.down_time_before = 0;
                component.ramp_limit_up = '';
                component.ramp_limit_down = '';
                component.ramp_limit_start_up = 1;
                component.ramp_limit_shut_down = 1;
                network.generators.push(component);
                addComponentMarker(component, type);
            } else if (type === 'Load') {
                component.bus = '';
                component.control = 'PQ';
                component.type = '';
                component.p_set = 100;
                component.q_set = 0;
                component.sign = -1;
                component.carrier = 'electricity';
                network.loads.push(component);
                addComponentMarker(component, type);
            } else if (type === 'Line') {
                component.bus0 = '';
                component.bus1 = '';
                component.type = '';
                component.x = '';
                component.r = '';
                component.g = '';
                component.b = '';
                component.s_nom = '';
                component.s_nom_extendable = false;
                component.s_nom_min = '';
                component.s_nom_max = '';
                component.s_max_pu = '';
                component.length = '';
                component.terrain_factor = '';
                component.num_parallel = '';
                component.carrier = '';
                component.capital_cost = '';
                component.lifetime = '';
                component.build_year = '';
                component.v_ang_min = '';
                component.v_ang_max = '';
                network.lines.push(component);
            } else if (type === 'Link') {
                // PyPSA Required fields: name (auto-generated), bus0, bus1
                component.bus0 = '';
                component.bus1 = '';
                // PyPSA Optional fields with defaults
                component.type = '';
                component.carrier = '';
                component.efficiency = 1;
                component.p_nom = 0;
                component.p_nom_extendable = false;
                component.p_nom_mod = 0;
                component.p_nom_min = 0;
                component.p_nom_max = '';
                component.p_set = 0;
                component.p_min_pu = '';
                component.p_max_pu = '';
                component.capital_cost = 0;
                component.marginal_cost = '';
                component.marginal_cost_quadratic = '';
                component.stand_by_cost = '';
                component.length = 0;
                component.terrain_factor = 1;
                component.active = true;
                component.committable = false;
                component.start_up_cost = 0;
                component.shut_down_cost = 0;
                component.min_up_time = 0;
                component.min_down_time = 0;
                component.up_time_before = 1;
                component.down_time_before = 0;
                component.ramp_limit_up = '';
                component.ramp_limit_down = '';
                component.ramp_limit_start_up = 1;
                component.ramp_limit_shut_down = 1;
                component.lifetime = '';
                component.build_year = 0;
                network.links.push(component);
            } else if (type === 'StorageUnit') {
                component.bus = '';
                component.control = 'PQ';
                component.type = '';
                component.p_nom = 100;
                component.p_nom_extendable = false;
                component.p_nom_min = 0;
                component.p_nom_max = '';
                component.p_min_pu = -1;
                component.p_max_pu = 1;
                component.p_set = 0;
                component.q_set = 0;
                component.sign = 1;
                component.carrier = 'electricity';
                component.max_hours = 6;
                component.efficiency_store = 0.9;
                component.efficiency_dispatch = 0.9;
                component.standing_losses = 0;
                component.inflow = 0;
                component.state_of_charge_initial = 0;
                component.state_of_charge_set = '';
                component.cyclic_state_of_charge = true;
                component.marginal_cost = 0;
                component.marginal_cost_storage = 0;
                component.capital_cost = 0;
                component.lifetime = '';
                component.build_year = '';
                network.storage_units.push(component);
                addComponentMarker(component, type);
            } else if (type === 'Store') {
                component.bus = '';
                component.type = '';
                component.e_nom = 1000;
                component.e_nom_extendable = false;
                component.e_nom_min = 0;
                component.e_nom_max = '';
                component.e_min_pu = 0;
                component.e_max_pu = 1;
                component.e_initial = 0;
                component.e_cyclic = false;
                component.e_cyclic_per_period = false;
                component.sign = 1;
                component.carrier = 'electricity';
                component.marginal_cost = 0;
                component.capital_cost = 0;
                component.standing_losses = 0;
                component.lifetime = '';
                component.build_year = '';
                network.stores.push(component);
                addComponentMarker(component, type);
            } else if (type === 'Transformer') {
                component.bus0 = '';
                component.bus1 = '';
                component.type = '';
                component.model = 'T';
                component.x = 0.1;
                component.r = 0;
                component.g = 0;
                component.b = 0;
                component.s_nom = 1000;
                component.s_nom_extendable = false;
                component.s_nom_min = 0;
                component.s_nom_max = '';
                component.s_max_pu = 1;
                component.tap_ratio = 1;
                component.tap_side = 0;
                component.tap_min = '';
                component.tap_max = '';
                component.tap_step = '';
                component.phase_shift = 0;
                component.carrier = 'AC';
                component.capital_cost = 0;
                component.lifetime = '';
                component.build_year = '';
                component.v_ang_min = '';
                component.v_ang_max = '';
                network.transformers.push(component);
            } else if (type === 'ShuntImpedance') {
                component.bus = '';
                component.g = '';
                component.b = '';
                network.shunt_impedances.push(component);
                addComponentMarker(component, type);
            }

            selectedComponent = component;
            updateComponentForm();
            updateComponentList();
            document.getElementById('context-menu').style.display = 'none';
        }

        // Add bus marker
        function addBusMarker(bus) {
            const marker = L.circleMarker([bus.y, bus.x], {
                radius: 8,
                fillColor: '#007bff',
                color: 'white',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            marker.bindPopup(`<strong>${bus.name}</strong><br>Type: Bus<br>Voltage: ${bus.v_nom} kV`);
            marker.on('click', function() {
                if (connectionMode && (!firstSelectedBus || firstSelectedBus !== bus.id)) {
                    if (!firstSelectedBus) {
                        firstSelectedBus = bus.id;
                        marker.setStyle({fillColor: '#ff0000'});
                    } else {
                        createConnection(firstSelectedBus, bus.id);
                        resetConnectionMode();
                    }
                } else {
                    selectedComponent = bus;
                    updateComponentForm();
                }
            });

            markers[bus.id] = marker;
        }

        // Add component marker (for non-bus components)
        function addComponentMarker(component, type) {
            const colors = {
                'Generator': '#28a745',
                'Load': '#ffc107', 
                'StorageUnit': '#6f42c1',
                'Store': '#17a2b8',
                'ShuntImpedance': '#dc3545'
            };

            // Store the original position
            component.map_x = contextMenuPos.lng;
            component.map_y = contextMenuPos.lat;

            const marker = L.circleMarker([contextMenuPos.lat, contextMenuPos.lng], {
                radius: 6,
                fillColor: colors[type] || '#6c757d',
                color: 'white',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map);

            let popupText = `<strong>${component.name}</strong><br>Type: ${type}`;
            if (type === 'Generator') {
                popupText += `<br>Power: ${component.p_nom} MW<br>Carrier: ${component.carrier}`;
            } else if (type === 'Load') {
                popupText += `<br>Power: ${component.p_set} MW`;
            } else if (type === 'StorageUnit') {
                popupText += `<br>Power: ${component.p_nom} MW<br>Hours: ${component.max_hours}`;
            } else if (type === 'Store') {
                popupText += `<br>Energy: ${component.e_nom} MWh`;
            }

            marker.bindPopup(popupText);
            marker.on('click', function() {
                selectedComponent = component;
                updateComponentForm();
            });

            markers[component.id] = marker;
        }

        // Create or update virtual connection line
        function updateVirtualConnection(component) {
            // Remove existing virtual connection
            if (virtualConnections[component.id]) {
                map.removeLayer(virtualConnections[component.id]);
                delete virtualConnections[component.id];
            }

            if (!component.bus || !component.map_x || !component.map_y) return;

            const bus = network.buses.find(b => b.id === component.bus);
            if (bus) {
                // Create dashed line from component to bus
                const virtualLine = L.polyline([
                    [component.map_y, component.map_x], 
                    [bus.y, bus.x]
                ], {
                    color: '#666666',
                    weight: 1,
                    opacity: 0.6,
                    dashArray: '3, 3'
                }).addTo(map);

                virtualConnections[component.id] = virtualLine;
            }
        }

        // Create connection between buses
        function createConnection(bus0Id, bus1Id) {
            const bus0 = network.buses.find(b => b.id === bus0Id);
            const bus1 = network.buses.find(b => b.id === bus1Id);
            
            if (!bus0 || !bus1) return;

            const id = generateId();
            const connection = {
                id: id,
                name: `${connectionMode}_${id}`,
                bus0: bus0Id,
                bus1: bus1Id
            };

            if (connectionMode === 'Line') {
                connection.x = 0.1;
                connection.r = 0.05;
                connection.s_nom = 1000;
                connection.length = 100;
                connection.num_parallel = 1;
                network.lines.push(connection);
            } else if (connectionMode === 'Link') {
                connection.p_nom = 1000;
                connection.efficiency = 1.0;
                connection.carrier = '';
                connection.marginal_cost = '';
                network.links.push(connection);
            }

            // Draw line on map
            const line = L.polyline([[bus0.y, bus0.x], [bus1.y, bus1.x]], {
                color: connectionMode === 'Line' ? '#007bff' : '#28a745',
                weight: 3,
                opacity: 0.7
            }).addTo(map);

            connections.push({id: connection.id, line: line});
        }

        // Toggle connection mode
        function toggleConnectionMode(mode) {
            if (connectionMode === mode) {
                resetConnectionMode();
            } else {
                connectionMode = mode;
                firstSelectedBus = null;
                // Update button colors
                document.querySelectorAll('.btn-secondary').forEach(btn => {
                    btn.className = 'btn btn-secondary';
                });
                event.target.className = 'btn btn-primary';
            }
        }

        // Reset connection mode
        function resetConnectionMode() {
            connectionMode = null;
            firstSelectedBus = null;
            // Reset marker colors
            Object.values(markers).forEach(marker => {
                marker.setStyle({fillColor: '#007bff'});
            });
            // Reset button colors
            document.querySelectorAll('.btn-primary').forEach(btn => {
                if (btn.textContent.includes('Add')) {
                    btn.className = 'btn btn-secondary';
                }
            });
        }

        // Update component form
        function updateComponentForm() {
            const formDiv = document.getElementById('component-form');
            
            if (!selectedComponent) {
                formDiv.innerHTML = '<p>Right-click on the map to add components or select an existing component to edit.</p>';
                return;
            }

            const type = getComponentType(selectedComponent);
            let formHTML = `<h4>${type} Editor</h4>`;
            
            // Name field (common to all)
            formHTML += `
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" value="${selectedComponent.name}" onchange="updateField('name', this.value)">
                </div>
            `;

            // Type-specific fields
            if (type === 'Bus') {
                formHTML += `
                    <h5 style="color: red;">PyPSA Required Fields</h5>
                    <p style="font-size: 12px; color: #666;">Name is auto-generated. No other required fields per PyPSA docs.</p>
                    
                    <h5 style="color: blue;">PyPSA Optional Fields (have defaults)</h5>
                    <div class="form-group">
                        <label>Longitude (optional - default: 0)</label>
                        <input type="number" step="any" value="${selectedComponent.x || ''}" onchange="updateField('x', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Latitude (optional - default: 0)</label>
                        <input type="number" step="any" value="${selectedComponent.y || ''}" onchange="updateField('y', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Nominal Voltage (optional - default: 1)</label>
                        <input type="number" value="${selectedComponent.v_nom !== undefined && selectedComponent.v_nom !== '' ? selectedComponent.v_nom : ''}" onchange="updateField('v_nom', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Carrier (optional - default: AC)</label>
                        <select value="${selectedComponent.carrier || ''}" onchange="updateField('carrier', this.value)">
                            <option value="">optional</option>
                            <option value="AC">AC</option>
                            <option value="DC">DC</option>
                            <option value="heat">Heat</option>
                            <option value="gas">Gas</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Voltage Magnitude Set (optional - default: 1)</label>
                        <input type="number" step="0.01" value="${selectedComponent.v_mag_pu_set || ''}" onchange="updateField('v_mag_pu_set', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Voltage Magnitude Min (optional)</label>
                        <input type="number" step="0.01" value="${selectedComponent.v_mag_pu_min || ''}" onchange="updateField('v_mag_pu_min', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Voltage Magnitude Max (optional)</label>
                        <input type="number" step="0.01" value="${selectedComponent.v_mag_pu_max || ''}" onchange="updateField('v_mag_pu_max', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Control (optional)</label>
                        <select value="${selectedComponent.control || ''}" onchange="updateField('control', this.value)">
                            <option value="">optional</option>
                            <option value="PQ">PQ</option>
                            <option value="PV">PV</option>
                            <option value="Slack">Slack</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sub Network (optional)</label>
                        <input type="text" value="${selectedComponent.sub_network || ''}" onchange="updateField('sub_network', this.value)" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Country (optional)</label>
                        <input type="text" value="${selectedComponent.country || ''}" onchange="updateField('country', this.value)" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Area (optional)</label>
                        <input type="text" value="${selectedComponent.area || ''}" onchange="updateField('area', this.value)" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Zone (optional)</label>
                        <input type="text" value="${selectedComponent.zone || ''}" onchange="updateField('zone', this.value)" placeholder="optional">
                    </div>
                `;
            } else if (type === 'Generator') {
                formHTML += `
                    <h5 style="color: red;">PyPSA Required Fields</h5>
                    <div class="form-group">
                        <label>Connected Bus* (required by PyPSA)</label>
                        <select value="${selectedComponent.bus || ''}" onchange="updateField('bus', this.value)">
                            <option value="">required</option>
                            ${network.buses.map(bus => `<option value="${bus.id}">${bus.name}</option>`).join('')}
                        </select>
                    </div>
                    <h5 style="color: blue;">PyPSA Optional Fields (have defaults)</h5>
                    <div class="form-group">
                        <label>Control (optional)</label>

                            ${network.buses.map(bus => `<option value="${bus.id}">${bus.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Nominal Power (MW)*</label>
                        <input type="number" value="${selectedComponent.p_nom || 100}" onchange="updateField('p_nom', parseFloat(this.value))">
                    </div>
                    <div class="form-group">
                        <label>Max Hours*</label>
                        <input type="number" value="${selectedComponent.max_hours || 6}" onchange="updateField('max_hours', parseFloat(this.value))">
                    </div>
                    <h5 style="color: blue;">Optional Fields (defaults shown)</h5>
                    <div class="form-group">
                        <label>Store Efficiency</label>
                        <input type="number" step="0.01" value="${selectedComponent.efficiency_store || 0.9}" onchange="updateField('efficiency_store', parseFloat(this.value))" placeholder="default: 0.9">
                    </div>
                    <div class="form-group">
                        <label>Dispatch Efficiency</label>
                        <input type="number" step="0.01" value="${selectedComponent.efficiency_dispatch || 0.9}" onchange="updateField('efficiency_dispatch', parseFloat(this.value))" placeholder="default: 0.9">
                    </div>
                    <div class="form-group">
                        <label>Standing Losses (per hour)</label>
                        <input type="number" step="0.001" value="${selectedComponent.standing_losses || 0}" onchange="updateField('standing_losses', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Initial State of Charge</label>
                        <input type="number" step="0.01" value="${selectedComponent.state_of_charge_initial || 0}" onchange="updateField('state_of_charge_initial', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Cyclic State of Charge</label>
                        <input type="checkbox" ${selectedComponent.cyclic_state_of_charge ? 'checked' : ''} onchange="updateField('cyclic_state_of_charge', this.checked)">
                    </div>
                    <div class="form-group">
                        <label>Marginal Cost (currency/MWh)</label>
                        <input type="number" value="${selectedComponent.marginal_cost || 0}" onchange="updateField('marginal_cost', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Capital Cost (currency/MW)</label>
                        <input type="number" value="${selectedComponent.capital_cost || 0}" onchange="updateField('capital_cost', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                `;
            } else if (type === 'Store') {
                formHTML += `
                    <h5 style="color: red;">Required Fields</h5>
                    <div class="form-group">
                        <label>Connected Bus*</label>
                        <select value="${selectedComponent.bus || ''}" onchange="updateField('bus', this.value)">
                            <option value="">Select Bus</option>
                            ${network.buses.map(bus => `<option value="${bus.id}">${bus.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Energy Capacity (MWh)*</label>
                        <input type="number" value="${selectedComponent.e_nom || 1000}" onchange="updateField('e_nom', parseFloat(this.value))">
                    </div>
                    <h5 style="color: blue;">Optional Fields (defaults shown)</h5>
                    <div class="form-group">
                        <label>Extendable</label>
                        <input type="checkbox" ${selectedComponent.e_nom_extendable ? 'checked' : ''} onchange="updateField('e_nom_extendable', this.checked)">
                    </div>
                    <div class="form-group">
                        <label>Min Energy (p.u.)</label>
                        <input type="number" step="0.01" value="${selectedComponent.e_min_pu || 0}" onchange="updateField('e_min_pu', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Max Energy (p.u.)</label>
                        <input type="number" step="0.01" value="${selectedComponent.e_max_pu || 1}" onchange="updateField('e_max_pu', parseFloat(this.value))" placeholder="default: 1">
                    </div>
                    <div class="form-group">
                        <label>Initial Energy</label>
                        <input type="number" value="${selectedComponent.e_initial || 0}" onchange="updateField('e_initial', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Cyclic</label>
                        <input type="checkbox" ${selectedComponent.e_cyclic ? 'checked' : ''} onchange="updateField('e_cyclic', this.checked)">
                    </div>
                    <div class="form-group">
                        <label>Standing Losses (per hour)</label>
                        <input type="number" step="0.001" value="${selectedComponent.standing_losses || 0}" onchange="updateField('standing_losses', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Marginal Cost (currency/MWh)</label>
                        <input type="number" value="${selectedComponent.marginal_cost || 0}" onchange="updateField('marginal_cost', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Capital Cost (currency/MWh)</label>
                        <input type="number" value="${selectedComponent.capital_cost || 0}" onchange="updateField('capital_cost', parseFloat(this.value))" placeholder="default: 0">
                    </div>
                    <div class="form-group">
                        <label>Carrier</label>
                        <input type="text" value="${selectedComponent.carrier || 'electricity'}" onchange="updateField('carrier', this.value)" placeholder="default: electricity">
                    </div>
                `;
            } else if (type === 'ShuntImpedance') {
                formHTML += `
                    <h5 style="color: red;">PyPSA Required Fields</h5>
                    <div class="form-group">
                        <label>Connected Bus* (required by PyPSA)</label>
                        <select value="${selectedComponent.bus || ''}" onchange="updateField('bus', this.value)">
                            <option value="">required</option>
                            ${network.buses.map(bus => `<option value="${bus.id}">${bus.name}</option>`).join('')}
                        </select>
                    </div>
                    <h5 style="color: blue;">PyPSA Optional Fields (have defaults)</h5>
                    <div class="form-group">
                        <label>Conductance (S) (optional - default: 0)</label>
                        <input type="number" step="0.001" value="${selectedComponent.g || ''}" onchange="updateField('g', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                    <div class="form-group">
                        <label>Susceptance (S) (optional - default: 0)</label>
                        <input type="number" step="0.001" value="${selectedComponent.b || ''}" onchange="updateField('b', this.value ? parseFloat(this.value) : '')" placeholder="optional">
                    </div>
                `;
            }

            formHTML += `
                <button class="btn btn-danger" onclick="deleteComponent()">Delete</button>
            `;

            formDiv.innerHTML = formHTML;
        }

        // Update field
        function updateField(field, value) {
            if (selectedComponent) {
                selectedComponent[field] = value;
                
                // Update marker position if bus coordinates changed
                if (getComponentType(selectedComponent) === 'Bus' && (field === 'x' || field === 'y')) {
                    const marker = markers[selectedComponent.id];
                    if (marker) {
                        marker.setLatLng([selectedComponent.y, selectedComponent.x]);
                    }
                    // Update all virtual connections to this bus
                    updateAllVirtualConnections();
                }
                
                // Update virtual connection when bus connection changes
                if (field === 'bus') {
                    updateVirtualConnection(selectedComponent);
                }
                
                // Update branch connections when bus0/bus1 changes
                if (field === 'bus0' || field === 'bus1') {
                    updateBranchConnections();
                }
                
                // Only update component list for name changes or connection changes
                // Don't update for every field change to prevent form regeneration
                if (field === 'name' || field === 'bus' || field === 'bus0' || field === 'bus1') {
                    updateComponentList();
                }
            }
        }

        // Update all virtual connections (useful when bus moves)
        function updateAllVirtualConnections() {
            [...network.generators, ...network.loads, ...network.storage_units, ...network.stores, ...network.shunt_impedances]
                .forEach(component => {
                    if (component.bus) {
                        updateVirtualConnection(component);
                    }
                });
            
            // Update branch components (lines, links, transformers)
            updateBranchConnections();
        }

        // Draw branch connections (Lines, Links, Transformers)
        function updateBranchConnections() {
            // Clear existing branch connections
            connections.forEach(conn => {
                if (conn.line) {
                    map.removeLayer(conn.line);
                }
            });
            connections.length = 0;

            // Draw Lines (solid blue)
            network.lines.forEach(line => {
                if (line.bus0 && line.bus1) {
                    const bus0 = network.buses.find(b => b.id === line.bus0);
                    const bus1 = network.buses.find(b => b.id === line.bus1);
                    if (bus0 && bus1) {
                        const lineOnMap = L.polyline([[bus0.y, bus0.x], [bus1.y, bus1.x]], {
                            color: '#0066cc',
                            weight: 4,
                            opacity: 0.8
                        }).addTo(map);
                        
                        lineOnMap.bindPopup(`<strong>${line.name}</strong><br>Type: Line<br>From: ${bus0.name}<br>To: ${bus1.name}`);
                        lineOnMap.on('click', function() {
                            selectedComponent = line;
                            updateComponentForm();
                        });
                        
                        connections.push({id: line.id, line: lineOnMap, type: 'Line'});
                    }
                }
            });

            // Draw Links (dashed green)
            network.links.forEach(link => {
                if (link.bus0 && link.bus1) {
                    const bus0 = network.buses.find(b => b.id === link.bus0);
                    const bus1 = network.buses.find(b => b.id === link.bus1);
                    if (bus0 && bus1) {
                        const linkOnMap = L.polyline([[bus0.y, bus0.x], [bus1.y, bus1.x]], {
                            color: '#28a745',
                            weight: 4,
                            opacity: 0.8,
                            dashArray: '10, 5'
                        }).addTo(map);
                        
                        linkOnMap.bindPopup(`<strong>${link.name}</strong><br>Type: Link<br>From: ${bus0.name}<br>To: ${bus1.name}`);
                        linkOnMap.on('click', function() {
                            selectedComponent = link;
                            updateComponentForm();
                        });
                        
                        connections.push({id: link.id, line: linkOnMap, type: 'Link'});
                    }
                }
            });

            // Draw Transformers (thick orange)
            network.transformers.forEach(transformer => {
                if (transformer.bus0 && transformer.bus1) {
                    const bus0 = network.buses.find(b => b.id === transformer.bus0);
                    const bus1 = network.buses.find(b => b.id === transformer.bus1);
                    if (bus0 && bus1) {
                        const transformerOnMap = L.polyline([[bus0.y, bus0.x], [bus1.y, bus1.x]], {
                            color: '#ff8c00',
                            weight: 6,
                            opacity: 0.8
                        }).addTo(map);
                        
                        transformerOnMap.bindPopup(`<strong>${transformer.name}</strong><br>Type: Transformer<br>From: ${bus0.name}<br>To: ${bus1.name}`);
                        transformerOnMap.on('click', function() {
                            selectedComponent = transformer;
                            updateComponentForm();
                        });
                        
                        connections.push({id: transformer.id, line: transformerOnMap, type: 'Transformer'});
                    }
                }
            });
        }

        // Delete component
        function deleteComponent() {
            if (!selectedComponent) return;
            
            const type = getComponentType(selectedComponent);
            const arrayName = type.toLowerCase() + 's';
            
            // Remove from network
            const index = network[arrayName].findIndex(c => c.id === selectedComponent.id);
            if (index > -1) {
                network[arrayName].splice(index, 1);
            }

            // Remove marker
            if (markers[selectedComponent.id]) {
                map.removeLayer(markers[selectedComponent.id]);
                delete markers[selectedComponent.id];
            }

            // Remove virtual connection
            if (virtualConnections[selectedComponent.id]) {
                map.removeLayer(virtualConnections[selectedComponent.id]);
                delete virtualConnections[selectedComponent.id];
            }

            selectedComponent = null;
            updateComponentForm();
            updateComponentList();
        }

        // Get component type
        function getComponentType(component) {
            if ('v_nom' in component) return 'Bus';
            if ('p_nom' in component && 'carrier' in component && 'marginal_cost' in component) return 'Generator';
            if ('p_set' in component) return 'Load';
            if ('bus0' in component && 'x' in component && 's_nom' in component) return 'Line';
            if ('bus0' in component && 'p_nom' in component && 'efficiency' in component) return 'Link';
            if ('bus0' in component && 'tap_ratio' in component) return 'Transformer';
            if ('max_hours' in component) return 'StorageUnit';
            if ('bus' in component && 'g' in component && 'b' in component && !('p_nom' in component)) return 'ShuntImpedance';
            return 'Store';
        }

        // Export to Excel
        function exportToExcel() {
            const workbook = XLSX.utils.book_new();

            Object.entries(network).forEach(([sheetName, data]) => {
                if (data.length > 0) {
                    const worksheet = XLSX.utils.json_to_sheet(data);
                    XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);
                }
            });

            XLSX.writeFile(workbook, 'pypsa_network.xlsx');
        }

        // Update component list in left panel
        function updateComponentList() {
            const listDiv = document.getElementById('component-list');
            const componentTypes = [
                {name: 'Buses', key: 'buses', color: '#007bff'},
                {name: 'Generators', key: 'generators', color: '#28a745'},
                {name: 'Loads', key: 'loads', color: '#ffc107'},
                {name: 'Lines', key: 'lines', color: '#0066cc'},
                {name: 'Links', key: 'links', color: '#28a745'},
                {name: 'Transformers', key: 'transformers', color: '#ff8c00'},
                {name: 'Storage Units', key: 'storage_units', color: '#6f42c1'},
                {name: 'Stores', key: 'stores', color: '#17a2b8'},
                {name: 'Shunt Impedances', key: 'shunt_impedances', color: '#dc3545'}
            ];

            let html = '';
            
            componentTypes.forEach(type => {
                const components = network[type.key];
                if (components.length > 0) {
                    const isExpanded = expandedGroups[type.key];
                    html += `
                        <div class="component-section">
                            <h4 onclick="toggleGroup('${type.key}')">
                                <div>
                                    <span class="component-type-icon" style="background-color: ${type.color};"></span>
                                    ${type.name} 
                                    <span class="component-count">${components.length}</span>
                                </div>
                                <span class="expand-icon ${isExpanded ? '' : 'collapsed'}">▼</span>
                            </h4>
                            <div class="component-list-items ${isExpanded ? '' : 'collapsed'}">
                    `;
                    
                    components.forEach(component => {
                        const isSelected = selectedComponent && selectedComponent.id === component.id;
                        const connectionInfo = getConnectionInfo(component, type.key);
                        html += `
                            <div class="component-list-item ${isSelected ? 'selected' : ''}" 
                                 onclick="selectComponentFromList('${component.id}', '${type.key}')">
                                <span>${component.name}</span>
                                <span style="font-size: 10px; color: #666;">${connectionInfo}</span>
                            </div>
                        `;
                    });
                    
                    html += `
                            </div>
                        </div>
                    `;
                }
            });

            if (html === '') {
                html = '<p style="color: #666; font-size: 12px;">No components added yet. Right-click on the map to add components.</p>';
            }

            listDiv.innerHTML = html;
        }

        // Get connection info for display
        function getConnectionInfo(component, typeKey) {
            if (typeKey === 'buses') {
                return `(${component.x?.toFixed(3) || 0}, ${component.y?.toFixed(3) || 0})`;
            } else if (['generators', 'loads', 'storage_units', 'stores', 'shunt_impedances'].includes(typeKey)) {
                const busName = component.bus ? network.buses.find(b => b.id === component.bus)?.name || 'No bus' : 'No bus';
                return busName;
            } else if (['lines', 'links', 'transformers'].includes(typeKey)) {
                const bus0Name = component.bus0 ? network.buses.find(b => b.id === component.bus0)?.name || 'No bus' : 'No bus';
                const bus1Name = component.bus1 ? network.buses.find(b => b.id === component.bus1)?.name || 'No bus' : 'No bus';
                return `${bus0Name} → ${bus1Name}`;
            }
            return '';
        }

        // Toggle component group expand/collapse
        function toggleGroup(groupKey) {
            expandedGroups[groupKey] = !expandedGroups[groupKey];
            updateComponentList();
        }

        // Select component from list
        function selectComponentFromList(componentId, typeKey) {
            const component = network[typeKey].find(c => c.id === componentId);
            if (component) {
                selectedComponent = component;
                updateComponentForm();
                updateComponentList(); // Refresh to show selection
            }
        }

        // Initialize form and component list
        updateComponentForm();
        updateComponentList();
    </script>
</body>
</html>
